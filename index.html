<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>心念指引</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ink:#1a1a18;--mist:#6b6b68;--veil:#a8a8a4;--paper:#faf9f6;--silk:#f2f0ea;
  --gold:#b8975a;--gold-soft:#e8d9b8;--line:rgba(26,26,24,0.1);
}
body{background:var(--paper);min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Georgia',serif;}
#app{background:var(--paper);min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;position:relative;overflow:hidden;}
.ripple{position:absolute;border-radius:50%;border:1px solid var(--line);animation:ripple-out 4s ease-out infinite;pointer-events:none;}
@keyframes ripple-out{0%{width:0;height:0;opacity:0.4;top:50%;left:50%;transform:translate(-50%,-50%)}100%{width:700px;height:700px;opacity:0;top:50%;left:50%;transform:translate(-50%,-50%)}}
.screen{width:100%;max-width:480px;display:flex;flex-direction:column;align-items:center;text-align:center;animation:fadein 1.2s ease both;}
@keyframes fadein{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.eyebrow{font-family:sans-serif;font-size:11px;letter-spacing:3px;color:var(--veil);margin-bottom:2.5rem;text-transform:uppercase;}
.question{font-size:24px;color:var(--ink);line-height:1.7;margin-bottom:2rem;font-weight:400;letter-spacing:0.02em;}
.sub{font-family:sans-serif;font-size:13px;color:var(--mist);margin-bottom:2rem;line-height:1.8;}
#thought-input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--line);padding:14px 0;font-size:17px;font-family:'Georgia',serif;color:var(--ink);outline:none;text-align:center;letter-spacing:0.05em;transition:border-color 0.4s;}
#thought-input::placeholder{color:var(--veil);font-style:italic;}
#thought-input:focus{border-color:var(--gold);}
.btn-main{margin-top:2.5rem;background:transparent;border:1px solid var(--ink);padding:12px 40px;font-size:13px;font-family:sans-serif;letter-spacing:2px;color:var(--ink);cursor:pointer;transition:all 0.3s;border-radius:0;}
.btn-main:hover{background:var(--ink);color:var(--paper);}
.btn-ghost{margin-top:1.2rem;background:transparent;border:none;padding:8px 20px;font-size:12px;font-family:sans-serif;letter-spacing:1.5px;color:var(--veil);cursor:pointer;transition:color 0.3s;}
.btn-ghost:hover{color:var(--ink);}
.deity-symbol{width:68px;height:68px;border-radius:50%;border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;margin:0 auto 1.5rem;animation:pulse-ring 3s ease-in-out infinite;}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(184,151,90,0.15)}50%{box-shadow:0 0 0 14px rgba(184,151,90,0)}}
.deity-name-zh{font-size:27px;color:var(--ink);letter-spacing:0.15em;margin-bottom:0.5rem;font-weight:400;}
.deity-name-py{font-family:sans-serif;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:2rem;}
.divider-gold{width:40px;height:1px;background:var(--gold-soft);margin:0 auto 1.8rem;}
.deity-poem{font-size:15px;color:var(--mist);line-height:2.4;margin-bottom:2rem;letter-spacing:0.05em;}
.chant-guide{background:var(--silk);padding:1.2rem 1.5rem;border-left:2px solid var(--gold-soft);width:100%;text-align:left;margin-bottom:1.5rem;}
.chant-guide p{font-family:sans-serif;font-size:12.5px;color:var(--mist);line-height:2;letter-spacing:0.03em;}
.chant-guide .chant-text{font-size:14px;color:var(--ink);font-family:'Georgia',serif;}
.chant-soft{font-family:sans-serif;font-size:11px;color:var(--veil);letter-spacing:1px;margin-bottom:2rem;}
.meditate-wrap{background:#14120e;min-height:100vh;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:3rem 2rem;position:relative;overflow:hidden;}
.orb{position:absolute;border-radius:50%;background:radial-gradient(circle,rgba(184,151,90,0.12) 0%,transparent 70%);animation:orb-breathe 5s ease-in-out infinite;pointer-events:none;}
@keyframes orb-breathe{0%,100%{width:200px;height:200px;opacity:0.4}50%{width:380px;height:380px;opacity:0.7}}
.med-name{font-size:30px;color:#e8d9b8;letter-spacing:0.2em;text-align:center;animation:breathe-text 5s ease-in-out infinite;position:relative;z-index:2;font-weight:400;line-height:1.7;}
@keyframes breathe-text{0%,100%{opacity:0.6;transform:scale(0.97)}50%{opacity:1;transform:scale(1.03)}}
.med-hint{font-family:sans-serif;font-size:11px;color:rgba(232,217,184,0.4);letter-spacing:3px;margin-top:1.5rem;position:relative;z-index:2;animation:breathe-text 5s ease-in-out infinite;}
.med-breath{font-family:sans-serif;font-size:12px;color:rgba(232,217,184,0.5);margin-top:2rem;line-height:2.8;position:relative;z-index:2;text-align:center;}
.counter-row{display:flex;gap:10px;margin-top:2.5rem;position:relative;z-index:2;flex-wrap:wrap;justify-content:center;}
.dot{width:7px;height:7px;border-radius:50%;background:rgba(232,217,184,0.2);transition:background 0.4s;}
.dot.active{background:rgba(184,151,90,0.9);}
.med-exit{font-family:sans-serif;font-size:12px;letter-spacing:2px;color:rgba(232,217,184,0.3);cursor:pointer;margin-top:3rem;position:relative;z-index:2;background:transparent;border:none;transition:color 0.3s;}
.med-exit:hover{color:rgba(232,217,184,0.7);}
.dissolve-wrap{min-height:60vh;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.dissolve-text{font-size:19px;color:var(--ink);letter-spacing:0.1em;transition:all 2s ease;margin-bottom:2rem;}
.dissolve-text.gone{opacity:0;filter:blur(10px);transform:scale(1.1);}
.release-word{font-size:13px;font-family:sans-serif;letter-spacing:3px;color:var(--gold);margin-bottom:3rem;}
.particles{display:flex;gap:5px;flex-wrap:wrap;justify-content:center;max-width:220px;margin:1rem auto;}
.particle{width:3px;height:3px;background:var(--gold);border-radius:50%;transition:all 1.8s ease;opacity:0.6;}
.particle.scatter{opacity:0;transform:translate(var(--tx),var(--ty)) scale(0);}
.end-msg{font-size:16px;color:var(--mist);line-height:2.2;opacity:0;transition:opacity 1.5s 2s;margin-top:1rem;}
.end-msg.show{opacity:1;}
</style>
</head>
<body>
<div id="app">
  <div class="ripple" style="animation-delay:0s"></div>
  <div class="ripple" style="animation-delay:1.4s"></div>
  <div class="ripple" style="animation-delay:2.8s"></div>

  <div id="screen-input" class="screen">
    <p class="eyebrow">心念指引</p>
    <h1 class="question">此刻，你心中<br>执着什么？</h1>
    <p class="sub">无需解释，只需如实写下</p>
    <input id="thought-input" type="text" placeholder="轻轻写下你的念头…" maxlength="80">
    <button class="btn-main" onclick="doMap()">寻觅指引</button>
  </div>

  <div id="screen-result" class="screen" style="display:none">
    <div class="deity-symbol">
      <svg viewBox="0 0 28 28" fill="none" stroke="#b8975a" stroke-width="1" width="28" height="28">
        <circle cx="14" cy="14" r="11"/>
        <path d="M14 6 Q18 10 14 14 Q10 18 14 22" stroke-width="0.8"/>
        <circle cx="14" cy="14" r="2" fill="#b8975a" stroke="none"/>
      </svg>
    </div>
    <p id="result-category" class="eyebrow"></p>
    <p id="result-name-zh" class="deity-name-zh"></p>
    <p id="result-name-py" class="deity-name-py"></p>
    <div class="divider-gold"></div>
    <p id="result-poem" class="deity-poem"></p>
    <div class="chant-guide">
      <p>轻声念诵 <strong>9 或 21 遍</strong></p>
      <p class="chant-text" id="result-breath"></p>
      <p style="margin-top:8px;font-size:11px;color:var(--veil);font-family:sans-serif;" id="result-mantra"></p>
    </div>
    <p class="chant-soft">不必用力，让声音自然流动</p>
    <button class="btn-main" onclick="goMeditate()">进入念诵</button>
    <button class="btn-ghost" onclick="goBack()">重新表达</button>
  </div>

  <div id="screen-meditate" class="screen" style="display:none;padding:0;width:100%;max-width:100%;">
    <div class="meditate-wrap">
      <div class="orb"></div>
      <p class="med-name" id="med-name-display"></p>
      <p class="med-hint">随呼吸，轻轻念诵</p>
      <div class="med-breath" id="med-breath-guide"></div>
      <div class="counter-row" id="med-dots"></div>
      <button class="med-exit" onclick="goDissolve()">念诵已毕，放下</button>
    </div>
  </div>

  <div id="screen-dissolve" class="screen" style="display:none">
    <div class="dissolve-wrap">
      <p class="release-word">任其散去</p>
      <p class="dissolve-text" id="dissolve-original"></p>
      <div class="particles" id="particles-wrap"></div>
      <p class="end-msg" id="end-msg">念头已散<br>此刻，只有当下</p>
    </div>
    <button class="btn-ghost" style="margin-top:2.5rem" onclick="restart()">重新开始</button>
  </div>
</div>

<script>

const DEFAULT = {
  cat:'一切皆有归处',name:'南无释迦牟尼佛',py:'Námo Shìjiāmóuní Fó',
  poem:'本师在此，从未离去\n安住当下，即是修行',
  breath:'吸气：南无\n呼气：释迦牟尼佛',mantra:'Oṃ Muni Muni Mahāmuni Śākyamuni Svāhā'
};

let current=null, thoughtText='', chantCount=0, chantInterval=null;

function mapThought(t) {
  const s = t.toLowerCase();
  for (const d of DB) {
    if (d.keys.some(k => s.includes(k))) return d;
  }
  return DEFAULT;
}

function show(id) {
  ['screen-input','screen-result','screen-meditate','screen-dissolve'].forEach(s=>{
    document.getElementById(s).style.display='none';
  });
  const el=document.getElementById(id);
  el.style.display='flex';
  el.style.animation='none';
  void el.offsetWidth;
  el.style.animation='';
  window.scrollTo(0,0);
}

function doMap() {
  const val=document.getElementById('thought-input').value.trim();
  if(!val) return;
  thoughtText=val;
  current=mapThought(val);
  document.getElementById('result-category').textContent=current.cat;
  document.getElementById('result-name-zh').textContent=current.name;
  document.getElementById('result-name-py').textContent=current.py;
  document.getElementById('result-poem').innerHTML=current.poem.replace(/\n/g,'<br>');
  document.getElementById('result-breath').innerHTML=current.breath.replace(/\n/g,'<br>');
  document.getElementById('result-mantra').textContent=current.mantra;
  document.getElementById('med-name-display').textContent=current.name;
  document.getElementById('med-breath-guide').innerHTML=current.breath.replace(/\n/g,'<br>');
  setTimeout(()=>show('screen-result'),300);
}

function goMeditate() {
  chantCount=0;
  const dots=document.getElementById('med-dots');
  dots.innerHTML='';
  for(let i=0;i<9;i++){
    const d=document.createElement('div');
    d.className='dot'; d.id='dot-'+i;
    dots.appendChild(d);
  }
  show('screen-meditate');
  clearInterval(chantInterval);
  chantInterval=setInterval(()=>{
    if(chantCount<9){
      document.getElementById('dot-'+chantCount).classList.add('active');
      chantCount++;
    } else { clearInterval(chantInterval); }
  },5000);
}

function goDissolve() {
  clearInterval(chantInterval);
  show('screen-dissolve');
  document.getElementById('dissolve-original').textContent=thoughtText;
  document.getElementById('dissolve-original').classList.remove('gone');
  document.getElementById('end-msg').classList.remove('show');
  const wrap=document.getElementById('particles-wrap');
  wrap.innerHTML='';
  for(let i=0;i<20;i++){
    const p=document.createElement('div');
    p.className='particle';
    p.style.setProperty('--tx',(Math.random()-0.5)*140+'px');
    p.style.setProperty('--ty',(Math.random()-0.5)*90-40+'px');
    wrap.appendChild(p);
  }
  setTimeout(()=>{
    document.getElementById('dissolve-original').classList.add('gone');
    document.querySelectorAll('.particle').forEach(p=>p.classList.add('scatter'));
  },800);
  setTimeout(()=>document.getElementById('end-msg').classList.add('show'),2400);
}

function goBack(){show('screen-input');}
function restart(){
  document.getElementById('thought-input').value='';
  thoughtText=''; current=null;
  show('screen-input');
}

document.getElementById('thought-input').addEventListener('keydown', function(e){
  if(e.key==='Enter') doMap();
});
</script>
</body>
</html>
